name: Deploy Sentinel Log Generator

on:
  push:
    branches: [main]
    paths:
      - "sentinel-log-generator/**"
  workflow_dispatch:           # allows manual trigger from the GitHub UI

env:
  # ── Change this to your Function App name after running the ARM deploy ──
  AZURE_FUNCTIONAPP_NAME: "<your-function-app-name>"
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "sentinel-log-generator"
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production      # optional: require manual approval in GitHub Environments

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 3. Install dependencies into the package folder ────────────────────
      - name: Resolve and install dependencies
        run: |
          pip install --target=".python_packages/lib/site-packages" \
            -r requirements.txt
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      # ── 4. Deploy to Azure Functions ───────────────────────────────────────
      #   Requires AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret in GitHub.
      #   See README.md §"GitHub Setup" for how to obtain it.
      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
